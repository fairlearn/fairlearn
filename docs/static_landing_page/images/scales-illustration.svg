<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .scale-bar { fill: none; stroke: currentColor; stroke-width: 2; }
      .scale-weight { fill: currentColor; opacity: 0.8; }
      .scale-wobble { animation: wobble 3s ease-in-out infinite; }
      @keyframes wobble {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-3deg); }
        75% { transform: rotate(3deg); }
      }
      @keyframes float-up-down {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      .scale-left { animation: float-up-down 2s ease-in-out infinite; }
      .scale-right { animation: float-up-down 2s ease-in-out infinite 0.3s; }
    </style>
  </defs>
  
  <!-- Balance beam -->
  <g class="scale-wobble" transform-origin="100 80">
    <!-- Fulcrum -->
    <circle cx="100" cy="90" r="6" class="scale-weight"/>
    <path d="M 85 90 L 100 75 L 115 90" class="scale-bar" stroke-linejoin="round"/>
    
    <!-- Left pan and weight -->
    <g class="scale-left">
      <line x1="70" y1="90" x2="70" y2="105" class="scale-bar"/>
      <rect x="55" y="105" width="30" height="25" rx="2" class="scale-weight"/>
    </g>
    
    <!-- Right pan and weight -->
    <g class="scale-right">
      <line x1="130" y1="90" x2="130" y2="110" class="scale-bar"/>
      <rect x="115" y="110" width="30" height="20" rx="2" class="scale-weight"/>
    </g>
    
    <!-- Beam -->
    <line x1="70" y1="90" x2="130" y2="90" class="scale-bar" stroke-width="3"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="30" cy="30" r="2" class="scale-weight" opacity="0.4"/>
  <circle cx="170" cy="40" r="3" class="scale-weight" opacity="0.3"/>
  <circle cx="40" cy="160" r="2.5" class="scale-weight" opacity="0.35"/>
</svg>
